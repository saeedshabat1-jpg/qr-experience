<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>Interactive QR Experience</title>
<style>
*{box-sizing:border-box}
body{
margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
font-family:Tahoma, Arial, sans-serif;color:#f7f7f5;
background:radial-gradient(circle at 85% 10%,rgba(255,127,38,.24),transparent 35%),
radial-gradient(circle at 0% 100%,rgba(255,127,38,.12),transparent 38%),
linear-gradient(160deg,#08080a,#151519);
}
.wrap{width:min(720px,100%)}
.card{
border:1px solid rgba(255,127,38,.42);border-radius:32px;padding:38px 26px;text-align:center;
background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.035));
box-shadow:0 24px 80px rgba(0,0,0,.45)
}
.symbol{font-size:42px;margin-bottom:14px;color:#ff7f26}
.label{color:#ff7f26;font-size:13px;font-weight:900;letter-spacing:2.4px;text-transform:uppercase;margin-bottom:18px}
h1{font-size:clamp(30px,7vw,52px);line-height:1.1;margin:0}
.sub{color:#cfcfcf;font-size:16px;line-height:1.8;max-width:560px;margin:14px auto 28px}
.quoteBox{min-height:230px;padding:28px 22px;border-radius:24px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin:26px 0}
.quote{font-size:clamp(26px,6vw,40px);line-height:1.55;font-weight:800}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
button,a.modeBtn{border:0;border-radius:999px;padding:14px 22px;font-size:15px;font-weight:900;cursor:pointer;text-decoration:none}
.primary{background:#ff7f26;color:#111}
.secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.14)}
.foot{font-size:12px;color:rgba(255,255,255,.50);margin-top:22px}
.modeList{display:flex;flex-direction:column;gap:14px;margin-top:26px}
.modeBtn{display:block;background:#ff7f26;color:#111}
</style>
</head>

function getMode(){
  const p = new URLSearchParams(location.search);
  const mode = p.get("mode");
  return DATA[mode] ? mode : null;
}
let last = -1;
function showRandom(){
  const mode = getMode();
  const items = DATA[mode].items;
  let i = Math.floor(Math.random()*items.length);
  if(items.length>1){ while(i===last) i = Math.floor(Math.random()*items.length); }
  last = i;
  document.getElementById("quote").textContent = items[i];
}
function shareText(){
  const text = document.getElementById("quote").textContent;
  if(navigator.share) navigator.share({title:document.title,text});
  else { navigator.clipboard.writeText(text); alert("Copied"); }
}
function render(){
  const mode = getMode();
  const root = document.getElementById("content");
  if(!mode){
    document.documentElement.lang = "ar";
    document.documentElement.dir = "rtl";
    root.innerHTML = `
      <div class="label">QR Experience</div>
      <h1>اختر التجربة</h1>
      <p class="sub">هذه الصفحة تعمل كرابط واحد لكل تجارب الـ QR.</p>

        <a class="modeBtn" href="?mode=luck">حظك اليوم</a>
      </div>`;
    return;
  }
  const d = DATA[mode];
  document.documentElement.lang = d.lang;
  document.documentElement.dir = d.dir;
  document.body.style.fontFamily = d.dir === "rtl" ? "Tahoma, Arial, sans-serif" : "Inter, Segoe UI, Arial, sans-serif";
  document.title = d.title;
  root.innerHTML = `
    <div class="label">${d.label}</div>
    <h1>${d.title}</h1>
    <p class="sub">${d.subtitle}</p>
    <div class="quoteBox"><div id="quote" class="quote"></div></div>
    <div class="actions">
      <button class="primary" onclick="showRandom()">${d.button}</button>
      <button class="secondary" onclick="shareText()">${d.share}</button>
    </div>`;
  showRandom();
}
render();
